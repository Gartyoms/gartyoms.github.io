        <!-- Tool Content -->
        <div class="container">
            <div class="tool-content">
                <textarea id="textInput" placeholder="Inizia a scrivere o incolla il tuo testo qui..."

                <div class="stats-row">
                    <div class="stat-item">

                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="sentenceCount">0</div>
                        <div class="stat-label">Frasi</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="paragraphCount">0</div>
                        <div class="stat-label">Paragrafi</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="readTime">0m 0s</div>
                        <div class="stat-label">Tempo lettura</div>
                    </div>
                </div>
            </div>

            <div class="btn-group" style="justify-content: center;">
                <button class="btn btn-secondary btn-sm"
                    onclick="document.getElementById('textInput').value=''; updateCounts();">🗑️ Cancella</button>

    <div class="toast" id="toast"></div>

    <script>
        function updateCounts() {
            const text = document.getElementById('textInput').value;

            // Words
            const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
            document.getElementById('wordCount').textContent = words;

            // Characters
            document.getElementById('charCount').textContent = text.length;

            // Characters without spaces
            document.getElementById('charNoSpaceCount').textContent = text.replace(/\s/g, '').length;

            // Sentences
            const sentences = text.trim() === '' ? 0 : text.split(/[.!?]+/).filter(s => s.trim()).length;
            document.getElementById('sentenceCount').textContent = sentences;

            // Paragraphs
            const paragraphs = text.trim() === '' ? 0 : text.split(/\n\s*\n|\n/).filter(p => p.trim()).length;
            document.getElementById('paragraphCount').textContent = paragraphs;

            // Reading time (avg 200 words/min)
            const totalSeconds = Math.ceil((words / 200) * 60);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            document.getElementById('readTime').textContent = minutes + 'm ' + seconds + 's';
        }

        function copyText() {
            const text = document.getElementById('textInput').value;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => showToast('✅ Testo copiato!'));
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
    </script>
