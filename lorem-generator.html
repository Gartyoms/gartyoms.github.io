    <script>
        const loremWords = [
            'lorem', 'ipsum', 'dolor', 'sit', 'amet', 'consectetur', 'adipiscing', 'elit',
            'sed', 'do', 'eiusmod', 'tempor', 'incididunt', 'ut', 'labore', 'et', 'dolore',

            'occaecat', 'cupidatat', 'non', 'proident', 'sunt', 'culpa', 'qui', 'officia',
            'deserunt', 'mollit', 'anim', 'id', 'est', 'laborum', 'at', 'vero', 'eos',
            'accusamus', 'iusto', 'odio', 'dignissimos', 'ducimus', 'blanditiis',
            'praesentium', 'voluptatum', 'deleniti', 'atque', 'corrupti', 'quos',
            'dolores', 'quas', 'molestias', 'excepturi', 'obcaecati', 'cupiditate',
            'provident', 'similique', 'mollitia', 'animi', 'minima', 'nostrum',
            'exercitationem', 'ullam', 'corporis', 'suscipit', 'laboriosam', 'nihil',
            'impedit', 'quo', 'minus', 'quod', 'maxime', 'placeat', 'facere', 'possimus',
            'omnis', 'voluptas', 'assumenda', 'repudiandae', 'temporibus', 'autem',
            'quibusdam', 'officiis', 'debitis', 'aut', 'rerum', 'necessitatibus',
            'saepe', 'eveniet', 'voluptates', 'repudiandae', 'recusandae', 'itaque',
            'earum', 'hic', 'tenetur', 'sapiente', 'delectus', 'reiciendis', 'voluptatibus',
            'maiores', 'alias', 'consequatur', 'perferendis', 'doloribus', 'asperiores',
            'repellat', 'tempore', 'cum', 'soluta', 'nobis', 'eligendi', 'optio',
            'cumque', 'impedit', 'quo', 'perspiciatis', 'unde',
        ];

        function randWord() {
            return loremWords[Math.floor(Math.random() * loremWords.length)];
        }

        function generateSentence() {
            const len = 8 + Math.floor(Math.random() * 12);
            let words = [];
            for (let i = 0; i < len; i++) words.push(randWord());
            words[0] = words[0].charAt(0).toUpperCase() + words[0].slice(1);
            return words.join(' ') + '.';
        }

        function generateParagraph() {
            const count = 3 + Math.floor(Math.random() * 4);
            let sentences = [];
            for (let i = 0; i < count; i++) sentences.push(generateSentence());
            return sentences.join(' ');
        }

        function generateLorem() {
            const amount = Math.max(1, Math.min(50, parseInt(document.getElementById('loremAmount').value) || 3));
            const type = document.getElementById('loremType').value;
            let result = '';

            if (type === 'paragraphs') {
                let paras = [];
                for (let i = 0; i < amount; i++) paras.push(generateParagraph());
                result = paras.join('\n\n');
            } else if (type === 'sentences') {
                let sents = [];
                for (let i = 0; i < amount; i++) sents.push(generateSentence());
                result = sents.join(' ');
            } else {
                let words = [];
                for (let i = 0; i < amount; i++) words.push(randWord());
                words[0] = words[0].charAt(0).toUpperCase() + words[0].slice(1);
                result = words.join(' ') + '.';
            }

            document.getElementById('loremOutput').textContent = result;
        }

        function copyLorem() {
            const text = document.getElementById('loremOutput').textContent;
            if (!text || text.includes('Clicca')) return;
            navigator.clipboard.writeText(text).then(() => showToast('✅ Testo copiato!'));
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Generate on load
        generateLorem();
    </script>
