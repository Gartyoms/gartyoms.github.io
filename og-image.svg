<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0b1a"/>
      <stop offset="60%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0d1b3e"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="35%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Griglia decorativa sottile -->
  <g stroke="#7c3aed" stroke-width="0.5" opacity="0.08">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Logo icon (64px scalato a 120px) -->
  <g transform="translate(80, 215) scale(1.875)">
    <rect width="64" height="64" rx="14" fill="url(#logoGrad)"/>
    <g stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <rect x="16" y="22" width="32" height="24" rx="3"/>
      <path d="M20 18h24v4H20z"/>
      <line x1="24" y1="30" x2="24" y2="38"/>
      <line x1="32" y1="30" x2="32" y2="38"/>
      <line x1="40" y1="30" x2="40" y2="38"/>
    </g>
  </g>

  <!-- Titolo -->
  <text x="230" y="270"
    font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">ToolBox Online</text>

  <!-- Separatore -->
  <rect x="230" y="295" width="560" height="3" rx="2" fill="url(#logoGrad)"/>

  <!-- Tagline -->
  <text x="230" y="355"
    font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="36" font-weight="400" fill="#a78bfa" letter-spacing="0.5">Strumenti Gratuiti Online</text>

  <!-- Pillole categoria -->
  <rect x="230" y="400" width="145" height="38" rx="19" fill="#7c3aed" fill-opacity="0.25" stroke="#7c3aed" stroke-width="1"/>
  <text x="302" y="424" text-anchor="middle"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-size="18" fill="#a78bfa">&#x26A1; Elettronica</text>

  <rect x="390" y="400" width="145" height="38" rx="19" fill="#2563eb" fill-opacity="0.2" stroke="#2563eb" stroke-width="1"/>
  <text x="462" y="424" text-anchor="middle"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-size="18" fill="#93c5fd">&#x1F4D0; Matematica</text>

  <rect x="550" y="400" width="115" height="38" rx="19" fill="#7c3aed" fill-opacity="0.15" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.5"/>
  <text x="607" y="424" text-anchor="middle"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-size="18" fill="#c4b5fd">&#x1F6E0; Utility</text>

  <!-- URL -->
  <text x="1120" y="590" text-anchor="end"
    font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="24" font-weight="500" fill="#6b7280" letter-spacing="0.5">www.toolboxonline.it</text>
</svg>
